name: Release

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            asset_name: windows-64
            binary_name: v2node.exe
          - goos: windows
            goarch: 386
            asset_name: windows-32
            binary_name: v2node.exe
          - goos: linux
            goarch: amd64
            asset_name: linux-64
            binary_name: v2node
          - goos: linux
            goarch: 386
            asset_name: linux-32
            binary_name: v2node
          - goos: linux
            goarch: arm64
            asset_name: linux-arm64-v8a
            binary_name: v2node
          - goos: linux
            goarch: arm
            goarm: "7"
            asset_name: linux-arm32-v7a
            binary_name: v2node
          - goos: linux
            goarch: arm
            goarm: "6"
            asset_name: linux-arm32-v6
            binary_name: v2node
          - goos: linux
            goarch: arm
            goarm: "5"
            asset_name: linux-arm32-v5
            binary_name: v2node
          - goos: linux
            goarch: riscv64
            asset_name: linux-riscv64
            binary_name: v2node
          - goos: linux
            goarch: mips64
            asset_name: linux-mips64
            binary_name: v2node
          - goos: linux
            goarch: mips64le
            asset_name: linux-mips64le
            binary_name: v2node
          - goos: linux
            goarch: mips
            asset_name: linux-mips32
            binary_name: v2node
          - goos: linux
            goarch: mips
            gomips: softfloat
            asset_name: linux-mips32-softfloat
            binary_name: v2node
          - goos: linux
            goarch: mipsle
            asset_name: linux-mips32le
            binary_name: v2node
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            asset_name: linux-mips32le-softfloat
            binary_name: v2node
          - goos: linux
            goarch: ppc64
            asset_name: linux-ppc64
            binary_name: v2node
          - goos: linux
            goarch: ppc64le
            asset_name: linux-ppc64le
            binary_name: v2node
          - goos: linux
            goarch: s390x
            asset_name: linux-s390x
            binary_name: v2node
          - goos: freebsd
            goarch: amd64
            asset_name: freebsd-64
            binary_name: v2node
          - goos: freebsd
            goarch: 386
            asset_name: freebsd-32
            binary_name: v2node
          - goos: freebsd
            goarch: arm64
            asset_name: freebsd-arm64-v8a
            binary_name: v2node
          - goos: freebsd
            goarch: arm
            goarm: "7"
            asset_name: freebsd-arm32-v7a
            binary_name: v2node
          - goos: darwin
            goarch: amd64
            asset_name: macos-64
            binary_name: v2node
          - goos: darwin
            goarch: arm64
            asset_name: macos-arm64-v8a
            binary_name: v2node
          - goos: android
            goarch: arm64
            asset_name: android-arm64-v8a
            binary_name: v2node

    env:
      CGO_ENABLED: 0
      GOEXPERIMENT: jsonv2
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      GOMIPS: ${{ matrix.gomips }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=manual-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download dependencies
        run: go mod download

      - name: Build archive payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p package
          go build -trimpath \
            -ldflags "-X 'github.com/fsh2502/v2nodePro/cmd.version=${{ steps.version.outputs.value }}' -s -w -buildid=" \
            -o "package/${{ matrix.binary_name }}" .
          cp README.md package/README.md
          cp LICENSE package/LICENSE
          curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geoip.dat" -o package/geoip.dat
          curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geosite.dat" -o package/geosite.dat

      - name: Create release archive
        shell: bash
        run: |
          set -euo pipefail
          pushd package >/dev/null
          zip -9 -r "../v2node-${{ matrix.asset_name }}.zip" .
          popd >/dev/null
          sha256sum "v2node-${{ matrix.asset_name }}.zip" > "v2node-${{ matrix.asset_name }}.zip.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v2node-${{ matrix.asset_name }}
          path: |
            v2node-${{ matrix.asset_name }}.zip
            v2node-${{ matrix.asset_name }}.zip.sha256

      - name: Upload release assets
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "v2node-${{ matrix.asset_name }}.zip" \
            "v2node-${{ matrix.asset_name }}.zip.sha256" \
            --clobber
